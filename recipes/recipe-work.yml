# image will be published to ghcr.io/<user>/<name>
name: cit-os
# description will be included in the image's metadata
description: This is my OS image for work.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/aurora-dx
image-version: stable # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files 
    files:
    #  - source: PearDark/*  #If needed to redeploy PearCursors
      #  destination: /var/home/.icons
      - source: LockScreenUi.qml  #ScreenLock test
        destination: /usr/share/plasma/shells/org.kde.plasma.desktop/contents/lockscreen/
  - type: dnf
    repos:
      files:
        - firefoxpwa.repo
        - https://packages.microsoft.com/yumrepos/edge/config.repo
        - https://download.opensuse.org/repositories/home:MartinVonReichenberg:KDE:Extra/Fedora_43/home:MartinVonReichenberg:KDE:Extra.repo
        #- https://packages.microsoft.com/yumrepos/microsoft-rhel9.0-prod/config.repo
    optfix:
      - microsoft
      - winboat
    install:
      packages:
        - libqalculate 
        #- qalculate-qt
        - qpwgraph
        - kismet
        - wireshark
        - qalculate
        - copyq
        - waydroid
        #- https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/x86_64/appstream/os/Packages/c/copy-jdk-configs-4.0-3.el9.noarch.rpm
        #- https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/x86_64/appstream/os/Packages/j/java-11-openjdk-headless-11.0.25.0.9-7.el9.x86_64.rpm
        #- https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9/x86_64/appstream/os/Packages/j/java-11-openjdk-11.0.25.0.9-7.el9.x86_64.rpm
        - microsoft-edge-beta #needs Optfix #MS Repo
        #- microsoft-identity-broker #needs Optfix
        # #- qt6-qtsvg
        - strongswan
        - strongswan-sqlite
        - strongswan-swanctl
        - strongswan-vici
        - cronie
        - cronie-anacron
        - crontabs
        - libfido2
        - fido2-tools
        - libfido2-devel
        - feh
        - firejail
        - golang-github-katalix-l2tp
        - NetworkManager-l2tp
        - NetworkManager-l2tp-gnome
        - koi #OpenSUSE KDE:Extra Repo
        #- msttcore-fonts-installer-2.6-1.noarch.rpm #local Font download
        #- msttcore-fonts-installer-2.6-1.src.rpm #local-rpm Font download
        - https://github.com/angryip/ipscan/releases/download/3.9.3/ipscan-3.9.3-1.x86_64.rpm
        - qt6-qtpositioning
        - qt6-qtlocation
        - NetworkManager-strongswan
        - NetworkManager-strongswan-gnome
        - screen
        - plasma-sdk
        - https://github.com/TibixDev/winboat/releases/download/v0.9.0/winboat-0.9.0-x86_64.rpm #needs OptFix
        - icedtea-web
        - freerdp
        - carla
        - firefox
        - firefoxpwa-2.18.0 #PackageCloud Repo File https://packagecloud.io/filips/FirefoxPWA
        - tpm2-tools
    remove:
      packages:
      # example: removing firefox (in favor of the flatpak)
      # "firefox" is the main package, "firefox-langpacks" is a dependency
      # - code
      # - devpod
        - flatpak-builder
      # - firefox
      # - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)

  - type: default-flatpaks
    configurations:
      - install:
          - io.podman_desktop.PodmanDesktop
          - app.zen_browser.zen
          #- com.lynnmichaelmartin.TimeTracker
          - com.github.zocker_160.SyncThingy
         # - org.libreoffice.LibreOffice

  #- type: scriptclassic Outlook on the web
   # scripts:
    #  - Win10sddm.sh
      #- MSLocal-build.sh #cablespaghetti's MS intune and edge workarounds
      #- vpnwil.sh
  - type: signing # this sets up the proper policy & signing files for signed images to work fully
